spring:
  application:
    name: portfolio-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/portfolio}
    username: ${SPRING_DATASOURCE_USERNAME:portfolio}
    password: ${SPRING_DATASOURCE_PASSWORD:portfolio}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

server:
  port: ${SERVER_PORT:8082}

app:
  cors:
    # Comma-separated list of origins allowed to call /api/**.
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4300}
