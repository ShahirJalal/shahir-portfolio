<section id="contact">
  <div class="container">
    <span class="eyebrow" appReveal>08 / Contact</span>
    <h2 class="section-title" appReveal>Let's talk</h2>
    <div class="contact-inner" appReveal>
      <div class="avatar">SJ</div>
      <div class="contact-links">
        <a href="mailto:shahirjalalhazli@gmail.com" class="btn btn-primary">Email</a>
        <a href="https://www.linkedin.com/in/shahirjalal/" target="_blank" rel="noopener" class="btn btn-secondary">LinkedIn</a>
        <a href="https://github.com/ShahirJalal" target="_blank" rel="noopener" class="btn btn-secondary">GitHub</a>
        <a href="https://drive.google.com/file/d/1rydrUdjaCoRAVH4ep9DSzzZWWko-hjJG/view" target="_blank" rel="noopener" class="btn btn-secondary">Resume</a>
      </div>
    </div>

    <form class="contact-form" appReveal #contactForm="ngForm" (ngSubmit)="onSubmit(contactForm)" novalidate>
      <div *ngIf="state === 'success'" class="form-banner form-banner-success">
        Message sent — thanks for reaching out, I'll get back to you soon.
      </div>
      <div *ngIf="state === 'error'" class="form-banner form-banner-error">
        {{ errorMessage }}
      </div>

      <div class="form-row">
        <label for="contact-name">Name</label>
        <input
          type="text"
          id="contact-name"
          name="name"
          [(ngModel)]="model.name"
          #nameField="ngModel"
          required
          maxlength="100"
          [class.invalid]="fieldErrors['name']">
        <span class="field-error" *ngIf="fieldErrors['name']">{{ fieldErrors['name'] }}</span>
      </div>

      <div class="form-row">
        <label for="contact-email">Email</label>
        <input
          type="email"
          id="contact-email"
          name="email"
          [(ngModel)]="model.email"
          #emailField="ngModel"
          required
          email
          maxlength="255"
          [class.invalid]="fieldErrors['email']">
        <span class="field-error" *ngIf="fieldErrors['email']">{{ fieldErrors['email'] }}</span>
      </div>

      <div class="form-row">
        <label for="contact-message">Message</label>
        <textarea
          id="contact-message"
          name="message"
          rows="5"
          [(ngModel)]="model.message"
          #messageField="ngModel"
          required
          maxlength="5000"
          [class.invalid]="fieldErrors['message']"></textarea>
        <span class="field-error" *ngIf="fieldErrors['message']">{{ fieldErrors['message'] }}</span>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="state === 'submitting'">
        {{ state === 'submitting' ? 'Sending...' : 'Send message' }}
      </button>
    </form>
  </div>
</section>
